@if (mostraNavbar) {
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
  <div class="container">
    
    <a class="navbar-brand fw-bold d-flex align-items-center text-dark" [routerLink]="rutaInicio">
      
      <div class="ratio ratio-1x1 me-2 rounded-circle overflow-hidden bg-light" 
           style="width: 45px; height: 45px; border: 2px solid var(--cafe-oscuro);">
        <img src="https://res.cloudinary.com/dfid8iuf3/image/upload/v1774239314/Gemini_Generated_Image_7jc647jc647jc647_jzi5f8.png" 
             class="img-fluid" 
             alt="Logo Café de Barrio"
             style="object-fit: contain; transform: scale(0.9);">
      </div>

      <span class="text-uppercase" style="letter-spacing: 1px; font-size: 1.1rem;">
        CAFÉ DE BARRIO
        <small class="d-block extra-small text-muted" style="margin-top: -3px; font-size: 0.65rem;">
          Especialidad & Tradición
        </small>
      </span>
    </a>

    <div class="d-flex align-items-center gap-2">
      
      @if (enRutaAdmin) {
          <div class="d-none d-md-flex gap-2 me-3 border-end pe-3">
            <a routerLink="/admin/productos" class="btn btn-sm btn-outline-dark border-0">
              <i class="bi bi-box-seam me-1"></i> Productos
            </a>
            <a routerLink="/admin/pedidos" class="btn btn-sm btn-outline-dark border-0">
              <i class="bi bi-receipt me-1"></i> Pedidos
            </a>
          </div>
          
          <button (click)="cerrarSesion()" class="btn btn-danger btn-sm px-3 shadow-sm">
            <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
          </button>

      } @else {
          <a routerLink="/login" class="btn btn-outline-dark btn-sm px-3 border-0">
            <i class="bi bi-person-circle me-1"></i> Iniciar Sesión
          </a>

          <button routerLink="/carrito" class="btn btn-dark position-relative px-4 shadow-sm ms-2">
            <i class="bi bi-cart3 me-2"></i>Carrito
            
            @if (cantidadItems > 0) {
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light">
                {{ cantidadItems }}
              </span>
            }
          </button>
      }

    </div>
  </div>
</nav>
}
