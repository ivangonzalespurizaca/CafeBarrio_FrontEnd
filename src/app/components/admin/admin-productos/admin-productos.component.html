<div class="container mt-1 pt-4 mb-5">
  <div class="card shadow-sm border-0 p-4 mb-4">
    <div class="row align-items-center g-3">
      <div class="col-md-6 d-flex align-items-center gap-3">
        <h2 class="fw-bold mb-0 me-4 text-dark">Panel de Productos</h2>

        <select class="form-select w-auto border-0 bg-light fw-bold text-muted shadow-sm"
          (change)="alCambiarCategoria($event)" style="border-radius: 10px; min-width: 220px;">
          <option value="0">Todas las categorías</option>
          @for (cat of categorias; track cat.id) {
          <option [value]="cat.id">{{ cat.nombre }}</option>
          }
        </select>
      </div>

      <div class="col-md-6 text-md-end">
        <button (click)="prepararNuevo()" class="btn btn-dark px-4 shadow-sm py-2" data-bs-toggle="modal"
          data-bs-target="#modalProducto">
          <i class="bi bi-plus-lg me-2"></i>Nuevo Producto
        </button>
      </div>
    </div>
  </div>

  <div class="card shadow-sm border-0 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-dark text-white">
          <tr>
            <th class="ps-4 py-3">Imagen</th>
            <th class="py-3">Nombre</th>
            <th class="py-3">Precio</th>
            <th class="py-3">Stock</th>
            <th class="text-center py-3 pe-4">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (item of productos; track item.id) {
          <tr [class.opacity-50]="!item.activo" class="transition-all">
            <td class="ps-4">
              <div class="ratio ratio-1x1 bg-light rounded-3 border overflow-hidden" style="width: 50px;">
                <img [src]="item.imagenUrl || 'assets/img/default-coffee.png'" class="img-fluid"
                  style="object-fit: contain;">
              </div>
            </td>
            <td class="fw-bold text-dark">{{ item.nombre }}</td>
            <td><span class="text-muted small">S/</span> {{ item.precio | number:'1.2-2' }}</td>
            <td>
              <span class="badge px-3 py-2 rounded-pill" [ngClass]="{
                        'bg-danger-subtle text-danger border border-danger': item.stock < 5,
                        'bg-dark text-white': item.stock >= 5
                      }">
                {{ item.stock }} unidades
              </span>
              @if (!item.activo) {
              <span
                class="ms-2 badge bg-secondary-subtle text-secondary border border-secondary small text-uppercase">Inactivo</span>
              }
            </td>
            <td class="text-center pe-4">
              <div class="btn-group shadow-sm" style="border-radius: 10px; overflow: hidden;">
                <button (click)="prepararEditar(item)" class="btn btn-sm btn-outline-dark me-2 shadow-sm py-2 px-3"
                  data-bs-toggle="modal" data-bs-target="#modalProducto" style="border-radius: 10px;"> <i
                    class="bi bi-pencil-square me-1"></i> Editar </button>

                <button (click)="eliminarProducto(item)" class="btn btn-sm py-2 px-3"
                  [class]="item.activo ? 'btn-outline-danger' : 'btn-outline-success'">
                  <i class="bi" [class]="item.activo ? 'bi-trash3' : 'bi-arrow-counterclockwise'"></i>
                  {{ item.activo ? 'Desactivar' : 'Activar' }}
                </button>
              </div>
            </td>
          </tr>
          } @empty {
          <tr>
            <td colspan="5" class="text-center py-5">
              <i class="bi bi-inbox display-4 text-muted opacity-25 d-block mb-3"></i>
              <p class="text-muted h5">No hay productos en esta categoría.</p>
              <button (click)="prepararNuevo()" class="btn btn-link text-decoration-none" data-bs-toggle="modal"
                data-bs-target="#modalProducto">
                Crear el primer producto
              </button>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

<app-admin-producto-form [categorias]="categorias" [productoParaEditar]="productoSeleccionado"
  (onGuardado)="cargarProductos()">
</app-admin-producto-form>
