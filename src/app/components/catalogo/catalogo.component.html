<div class="container mt-4 mb-5">
  <div class="d-flex justify-content-center flex-wrap gap-2 mb-4">
    <button (click)="filtrar(0)" 
            class="btn px-4 shadow-sm"
            style="min-width: 120px;"
            [class.btn-dark]="categoriaSeleccionada === 0"
            [class.btn-outline-dark]="categoriaSeleccionada !== 0">
      Todos
    </button>

    <button *ngFor="let cat of categorias" 
            (click)="filtrar(cat.id)" 
            class="btn px-4 shadow-sm"
            style="min-width: 120px;"
            [class.btn-dark]="categoriaSeleccionada === cat.id"
            [class.btn-outline-dark]="categoriaSeleccionada !== cat.id">
      {{ cat.nombre }}
    </button>
  </div>

  <hr class="mb-5 opacity-25">

  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
    <div class="col" *ngFor="let p of productos">
      <div class="card h-100 shadow-sm border-0 overflow-hidden">
        
        <div class="ratio ratio-1x1 bg-light d-flex align-items-center justify-content-center">
          <img [src]="p.imagenUrl || 'assets/img/default-coffee.png'" 
               class="card-img-top img-fluid" 
               [alt]="p.nombre" 
               style="object-fit: contain; max-height: 100%; max-width: 100%;">
        </div>
        
        <div class="card-body d-flex flex-column text-center">
          <h5 class="card-title fw-bold mb-1">{{p.nombre}}</h5>
          
          <div class="flex-grow-1 mt-2">
            @if (p.stock > 0) {
              <span class="badge rounded-pill bg-light text-dark border small fw-normal">
                Disponibles: <span class="fw-bold">{{ p.stock }}</span>
              </span>
            } @else {
              <span class="badge rounded-pill bg-danger-subtle text-danger border-danger small fw-bold">
                Agotado
              </span>
            }
          </div>
          
          <div class="mt-3">
             <h4 class="fw-bold text-dark">S/ {{p.precio | number:'1.2-2'}}</h4>
          </div>
        </div>

        <div class="card-footer bg-transparent border-0 pt-0 pb-3">
          <div class="d-grid gap-2">
            <button [routerLink]="['/producto', p.id]" class="btn btn-outline-secondary btn-sm">
              Ver detalle
            </button>
            
            <button (click)="agregarAlCarrito(p)" 
                    class="btn btn-dark" 
                    [disabled]="p.stock <= 0">
              <i class="bi bi-cart-plus me-2"></i>
              {{ p.stock > 0 ? 'Agregar' : 'Sin stock' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
